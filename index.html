<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Infantil · 50 atividades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9eec1 0%, #f6d5b3 100%);
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* cabeçalho divertido */
        .cabecalho {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .cabecalho h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2d4059;
            text-shadow: 4px 4px 0 #fbd46d, 6px 6px 0 rgba(0,0,0,0.1);
            letter-spacing: -0.5px;
            word-break: break-word;
        }

        .cabecalho p {
            font-size: 1.4rem;
            background-color: #fbd46d;
            display: inline-block;
            padding: 0.4rem 2rem;
            border-radius: 60px;
            color: #1f2c3a;
            font-weight: 600;
            box-shadow: 0 8px 0 #eaac7f;
            margin-top: 0.5rem;
        }

        .cabecalho p span {
            background: #2d4059;
            color: #f9eec1;
            border-radius: 50%;
            width: 2.2rem;
            height: 2.2rem;
            display: inline-block;
            line-height: 2.2rem;
            margin: 0 0.2rem;
            font-size: 1.5rem;
        }

        /* grade mágica 5x10 = 50 espaços */
        .grade-galeria {
            display: grid;
            grid-template-columns: repeat(5, 1fr);  /* 5 colunas */
            gap: 1.2rem;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: 0.5rem;
            background-color: rgba(255, 250, 235, 0.6);
            border-radius: 60px 60px 30px 30px;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 30px -8px rgba(90, 60, 30, 0.4), inset 0 -3px 0 #ffe3b0;
            border: 3px solid #ffeac5;
        }

        /* cada cartão de atividade */
        .cartao-atividade {
            background-color: #fffcf0;
            border-radius: 35px 35px 25px 25px;
            padding: 1rem 0.5rem 0.8rem 0.5rem;
            box-shadow: 0 10px 0 #eaac7f, 0 8px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.15s ease, box-shadow 0.15s;
            border: 2px solid #fccf9c;
            cursor: pointer;
            min-width: 0; /* para evitar estouro em telas pequenas */
        }

        .cartao-atividade:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 0 #d68b5c, 0 15px 20px rgba(0, 0, 0, 0.15);
        }

        /* a tag <img> ocupa quase todo o espaço */
        .cartao-atividade img {
            width: 100%;
            aspect-ratio: 1 / 1;  /* quadradinho fofo */
            object-fit: cover;      /* cobre sem distorcer, mas mantém a brincadeira */
            border-radius: 25px 25px 18px 18px;
            background-color: #b2d8d8; /* fundo enquanto não carrega */
            border: 3px solid white;
            box-shadow: inset 0 0 0 2px #fbd46d, 0 4px 6px rgba(0,0,0,0.1);
            display: block;
            transition: 0.2s;
        }

        /* legenda da atividade (só por diversão) */
        .cartao-atividade figcaption {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #3b2e1e;
            background: #feebb7;
            width: 100%;
            text-align: center;
            border-radius: 30px;
            padding: 0.3rem 0;
            border: 2px solid #ffc491;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* estilo para imagens placeholder (quebradas ou não encontradas) */
        .cartao-atividade img[alt] {
            font-size: 0.7rem;
            color: #1e4d6b;
            background: #f7e5c2;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem;
        }

        /* rodapé brincante */
        .rodape {
            margin-top: 2.5rem;
            background: #ffd89a;
            border-radius: 100px;
            padding: 0.7rem 2.5rem;
            color: #1f3a4b;
            font-weight: 600;
            font-size: 1.2rem;
            border: 3px solid white;
            box-shadow: 0 5px 0 #b47c5a;
        }

        /* adaptação para mobile (vira 2 colunas) */
        @media (max-width: 720px) {
            .grade-galeria {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.9rem;
            }
            .cabecalho h1 {
                font-size: 2rem;
            }
        }
        @media (max-width: 400px) {
            .grade-galeria {
                grid-template-columns: 1fr; /* 1 coluna em telas muito pequenas */
            }
        }

        /* pequena animação nos 50 cards */
        @keyframes aparecer {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .cartao-atividade {
            animation: aparecer 0.3s ease backwards;
        }
        /* atraso escalonado divertido (opcional) */
        .cartao-atividade:nth-child(n) {
            animation-delay: calc(0.02s * var(--i, 0));
        }
    </style>
</head>
